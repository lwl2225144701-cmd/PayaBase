# Alembic 配置(PayaBase 第三阶段: 词法索引表)
# sqlalchemy.url 由 migrations/env.py 从 core.config.settings 注入(可用
# ALEMBIC_DB_URL 环境变量覆盖, 集成测试据此指向独立测试库)。
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
