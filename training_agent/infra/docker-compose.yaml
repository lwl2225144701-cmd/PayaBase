services:
  postgres:
    container_name: training-postgres
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training123
      POSTGRES_DB: training_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U training -d training_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: training-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  minio:
    container_name: training-minio
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  vectord:
    container_name: training-vectord
    build:
      context: .
      dockerfile: service-images.Dockerfile
      target: vector-runtime
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8001"
    volumes:
      - modelscope_cache:/root/.cache/modelscope
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 10s
      retries: 3

  rerankd:
    container_name: training-rerankd
    build:
      context: .
      dockerfile: service-images.Dockerfile
      target: rerank-runtime
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8003:8003"
    volumes:
      - modelscope_cache:/root/.cache/modelscope
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 10s
      retries: 3

  openserp:
    container_name: training-openserp
    image: karust/openserp:latest
    shm_size: 2gb
    init: true
    ports:
      - "7070:7000"
    environment:
      OPENSERP_SERVER_HOST: "0.0.0.0"
      OPENSERP_SERVER_PORT: 7000
    command: serve -l
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  searchd:
    container_name: training-searchd
    build:
      context: .
      dockerfile: service-images.Dockerfile
      target: search-runtime
    environment:
      - PYTHONUNBUFFERED=1
      - OPENSERP_URL=http://openserp:7000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SEARCH_REDIS_DB=4
      - SEARCH_DEFAULT_ENGINE=baidu
      - SEARCH_DEFAULT_LIMIT=5
      - SEARCH_TIMEOUT_SEC=20
      - SEARCH_CACHE_TTL_SEC=180
      - SEARCH_FAILURE_THRESHOLD=3
      - SEARCH_FAILURE_COOLDOWN_SEC=60
      - SEARCH_FALLBACK_ENGINE=bing
    ports:
      - "8004:8004"
    depends_on:
      openserp:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 10s
      retries: 3

  celery-worker:
    container_name: training-celery-worker
    build:
      context: ..
      dockerfile: Dockerfile
      target: celery-runtime
    env_file:
      - ../.env
    # 绕过宿主 Clash fake-ip DNS 毒化：容器内用真实 DNS 解析外部域名后直连出网
    # （sensenova 为国内服务，直连可达；内部服务 postgres/redis/minio/vectord/rerankd/searchd
    #  走 docker 服务名，不受影响）
    dns:
      - 223.5.5.5
      - 8.8.8.8
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=training
      - POSTGRES_PASSWORD=training123
      - POSTGRES_DB=training_agent
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=training-docs
      - VECTOR_SERVICE_URL=http://vectord:8001
      - RERANK_SERVICE_URL=http://rerankd:8003
      - SEARCH_SERVICE_URL=http://searchd:8004
      - PPT_MINIO_BUCKET=ppt-files
      - PDF_MINIO_BUCKET=pdf-files
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: celery -A core.tasks worker --loglevel=info --concurrency=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  modelscope_cache:
